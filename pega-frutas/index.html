<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <!-- Faz a página se ajustar ao tamanho da tela do celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pega-Frutas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Barra de cima: o link do menu e o placar, tudo numa linha só -->
  <header id="topo">
    <a id="voltarMenu" href="../index.html">⬅️ Menu</a>

    <div id="info">
      <span>🎯 <span id="pontos">0</span></span>
      <span>❤️ <span id="vidas">5</span></span>
      <span>🏆 <span id="recorde">0</span></span>
    </div>
  </header>

  <!-- O jogo ocupa todo o espaço que sobrar da tela -->
  <main id="areaDoJogo">
    <canvas id="jogo" width="480" height="500"></canvas>

    <!-- Fica por CIMA do jogo quando você perde, então nunca sai cortado -->
    <div id="fimDeJogo" class="escondido">
      <p>Fim de jogo!</p>
      <p id="placarFinal"></p>
      <button id="botaoReiniciar">Jogar de novo</button>
    </div>
  </main>

  <!-- Instruções: aparecem no computador e somem no celular, para o jogo
       poder ocupar a tela inteira -->
  <footer id="ajuda">
    <p>Setas ⬅️ ➡️ movem a cesta. Pegue as frutas, desvie das bombas 💣 e aperte <strong>Espaço</strong> para reiniciar.</p>
    <p>📱 No celular: arraste o dedo pela tela para mover a cesta.</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
