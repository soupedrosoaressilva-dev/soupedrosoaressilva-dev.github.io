<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <!-- Faz a página se ajustar ao tamanho da tela do celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nave Atiradora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Barra de cima: o link do menu e o placar, tudo numa linha só -->
  <header id="topo">
    <a id="voltarMenu" href="../index.html">⬅️ Menu</a>

    <div id="info">
      <span>🎯 <span id="pontos">0</span></span>
      <span>❤️ <span id="vidas">3</span></span>
      <span>🚦 <span id="nivel">1</span></span>
      <span>🔫 <span id="arma">1</span></span>
      <span>🏆 <span id="recorde">0</span></span>
    </div>
  </header>

  <!-- O jogo ocupa todo o espaço que sobrar da tela -->
  <main id="areaDoJogo">
    <canvas id="jogo" width="480" height="560"></canvas>

    <!-- Fica por CIMA do jogo quando você perde, então nunca sai cortado -->
    <div id="fimDeJogo" class="escondido">
      <p>Fim de jogo!</p>
      <p id="placarFinal"></p>
      <button id="botaoReiniciar">Jogar de novo</button>
    </div>
  </main>

  <!-- Instruções: aparecem no computador e somem no celular, para o jogo
       poder ocupar a tela inteira -->
  <footer id="ajuda">
    <p>
      Setas ⬅️ ➡️ movem a nave e <strong>Espaço</strong> atira.
      <strong>R</strong> reinicia. Chegando a <strong>1000 pontos</strong>, só vêm naves fortes!
    </p>
    <p>📱 No celular: arraste o dedo para mover a nave — ela atira sozinha enquanto você toca na tela.</p>
  </footer>

  <script src="game.js"></script>
</body>
</html>
